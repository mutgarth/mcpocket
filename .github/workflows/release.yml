name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin

          - platform: macos-x86_64
            runner: macos-14
            target: x86_64-apple-darwin

          - platform: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      - name: Run tests
        env:
          TMPDIR: /tmp
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/mcpocket mcpocket-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpocket-${{ matrix.platform }}
          path: mcpocket-${{ matrix.platform }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mcpocket-macos-arm64
            mcpocket-macos-x86_64
            mcpocket-linux-x86_64
