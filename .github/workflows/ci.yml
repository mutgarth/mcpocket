name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-ci-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-ci-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked
